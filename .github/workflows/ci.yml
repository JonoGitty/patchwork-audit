name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt JavaScript actions into Node.js 24 ahead of GitHub's 2026-09-16
# deprecation of Node 20 on Actions runners. Removes the deprecation
# annotation on every run and surfaces any forward-compat breakage now.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4.1
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm lint
